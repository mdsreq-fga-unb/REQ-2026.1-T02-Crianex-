<path d="M585,252 h30 v18 h-30" fill="none" stroke="#37474F" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="623" y="258" font-size="11" fill="#333">validateJWT + requireRole</text>
<text x="700" y="288" text-anchor="middle" font-size="11" fill="#333">SELECT notifications ORDER BY created_at DESC</text>
<line x1="585" y1="294" x2="815" y2="294" stroke="#37474F" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="700" y="332" text-anchor="middle" font-size="11" fill="#333">lista</text>
<line x1="815" y1="338" x2="585" y2="338" stroke="#78909C" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ahr)"/>
