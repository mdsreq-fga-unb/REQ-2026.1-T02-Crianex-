site_name: Crianex
site_description: Plataforma de Gestão e Portfólio de Projetos SaaS
site_author: Equipe Crianex
docs_dir: docs

theme:
  name: material
  language: pt-BR
  logo: assets/logo.png
  favicon: assets/logo.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - header.autohide

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      title: Nesta página

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/
  generator: false
  status:
    new: Novo
    deprecated: Obsoleto

extra_css:
  - assets/extra.css

nav:
  - Home: index.md
  - Documento de Visão:
    - visao/index.md
    - "1 — Cenário Atual": visao/1-cenario-atual.md
    - "2.1–2.3 — Solução Proposta": visao/2-1-2-3-solucao-proposta.md
    - "2.4 — Tecnologias Utilizadas": visao/2-4-tecnologias.md
    - "2.5 — Posicionamento no Mercado": visao/2-5-mercado.md
    - "2.6 — Viabilidade do Projeto": visao/2-6-viabilidade.md
    - "2.7 — Benefícios Esperados": visao/2-7-beneficios.md
    - "3 — Estratégias de ESW": visao/3-estrategias-esw.md
    - "4 — Engenharia de Requisitos": visao/4-engenharia-requisitos.md
    - "5 — Cronograma": visao/5-cronograma.md
    - "6 — Interação Equipe-Cliente": visao/6-interacao-equipe-cliente.md
    - "10.1 — Lições Aprendidas": visao/10-1-licoes-aprendidas.md
  - Atas de Reunião:
    - atas/index.md
    - "09/04/2026 — Alinhamento de Projeto": atas/2026-04-09.md
  - Backlog:
    - backlog/index.md
  - Arquitetura:
    - arquitetura/index.md
  - Instruções do MkDocs:
    - mkdocs-guide/index.md
