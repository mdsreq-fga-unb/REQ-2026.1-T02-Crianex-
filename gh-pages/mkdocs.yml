site_name: Crianex
site_description: Plataforma de Gestão e Portfólio de Projetos SaaS
site_author: Equipe Crianex
docs_dir: docs

theme: cinder

plugins:
  - search:
      lang: pt
  - mermaid2

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - fenced_code
  - toc:
      permalink: true
      title: Nesta página

extra_css:
  - assets/extra.css

nav:
  - Home: index.md
  - Visão:
    - "1 · Cenário": visao/cenario.md
    - "2 · Solução": visao/solucao.md
    - "3 · Estratégias": visao/estrategias.md
    - "4 · Eng. de Requisitos": visao/er.md
    - "5 · Cronograma": visao/cronograma.md
    - "6 · Equipe e Interação": visao/equipe.md
    - "Lições Aprendidas": visao/10-licoes/index.md
  - Iterações:
    - "Visão Geral": iteracoes/index.md
    - "IT1 — Unidade 1":
      - "Resumo": iteracoes/iteracao-1/index.md
      - "Ata — 09/04/2026": iteracoes/iteracao-1/atas/2026-04-09.md
    - "IT2 — Vitrine Pública":
      - "Resumo": iteracoes/iteracao-2/index.md
    - "IT3 — Núcleo Admin":
      - "Resumo": iteracoes/iteracao-3/index.md
    - "IT4 — Operação Digital":
      - "Resumo": iteracoes/iteracao-4/index.md
    - "Pós-venda":
      - "Resumo": iteracoes/pos-venda/index.md
  - Backlog: backlog/index.md
  - Arquitetura: arquitetura/index.md
