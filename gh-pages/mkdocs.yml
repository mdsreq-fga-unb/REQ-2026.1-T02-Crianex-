site_name: Crianex
site_description: Plataforma de Gestão e Portfólio de Projetos SaaS
site_author: Equipe Crianex
docs_dir: docs

theme: cinder

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - fenced_code
  - toc:
      permalink: true
      title: Nesta página

extra_css:
  - assets/extra.css

nav:
  - Home: index.md
  - Visão:
    - "1 · Cenário": visao/cenario.md
    - "2 · Solução": visao/solucao.md
    - "3 · Estratégias": visao/estrategias.md
    - "4 · Eng. de Requisitos": visao/er.md
    - "5 · Cronograma": visao/cronograma.md
    - "6 · Equipe e Interação": visao/equipe.md
    - "Lições Aprendidas": visao/10-licoes/index.md
  - Atas:
    - atas/index.md
    - "Ata 0 — 09/04/2026": atas/2026-04-09.md
  - Sprints:
    - sprints/index.md
    - "Sprint 0 — Unidade 1": sprints/sprint-0.md
  - Backlog: backlog/index.md
  - Arquitetura: arquitetura/index.md
