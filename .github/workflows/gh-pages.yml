name: Deploy Docs

on:
  push:
    branches: ['main']
    paths:
      - 'gh-pages/docusaurus/**'
      - '.github/workflows/gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-docusaurus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gh-pages/docusaurus/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: gh-pages/docusaurus

      - name: Build site
        run: npm run build
        working-directory: gh-pages/docusaurus

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages/docusaurus/build
