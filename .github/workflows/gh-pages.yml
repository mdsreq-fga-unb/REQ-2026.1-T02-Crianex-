name: CI

on:
  push:
    branches: ["main"]
  pull_request:                                                                          
    branches: ["main"]
  workflow_dispatch:                                                                     
                                                 
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:                                                                               
      - uses: actions/checkout@v4
        with:                                                                            
          fetch-depth: 0                         

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
                                                                                         
      - name: Cache MkDocs dependencies
        uses: actions/cache@v4                                                           
        with:                                    
          key: mkdocs-material-${{ hashFiles('gh-pages/requirements.txt','.github/workflows/ci.yml') }}                                                           
          path: ~/.cache/pip
          restore-keys: |                                                                
            mkdocs-material-                     

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material
          if [ -f gh-pages/requirements.txt ]; then pip install -r gh-pages/requirements.txt; fi
                                                                                         
      - name: Deploy to GitHub Pages                                                     
        run: mkdocs gh-deploy --force --config-file gh-pages/mkdocs.yml
        
