name: CI

on:
  push:
    branches: [main, developer]
  pull_request:
    branches: [main, developer]

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: ESLint — backend
        run: npm run lint
        working-directory: backend

      - name: SvelteKit sync
        run: npx svelte-kit sync
        working-directory: frontend

      - name: ESLint — frontend
        run: npm run lint
        working-directory: frontend

      - name: Prettier check
        run: npx prettier --check .

  # ── Typecheck ───────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — backend
        run: npm run typecheck
        working-directory: backend

      - name: SvelteKit sync
        run: npx svelte-kit sync
        working-directory: frontend

      - name: Paraglide compile
        run: npx paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide
        working-directory: frontend

      - name: TypeScript — frontend
        run: npm run typecheck
        working-directory: frontend

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: http://127.0.0.1:54321

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Start Supabase local
        run: |
          set -euo pipefail

          supabase telemetry disable
          supabase start

          # Capture and parse supabase status to extract the actual API keys.
          # Strips ANSI escape codes before parsing.
          # Supports both the new sb_ key format and the legacy JWT format.
          supabase status 2>&1 \
            | sed $'s/\033\\[[0-9;]*[A-Za-z]//g' \
            > /tmp/sb-status.txt || true

          SECRET_KEY=$(grep -oE 'sb_secret_[A-Za-z0-9_-]+' /tmp/sb-status.txt | head -1)
          ANON_KEY=$(grep -oE 'sb_publishable_[A-Za-z0-9_-]+' /tmp/sb-status.txt | head -1)

          # Fallback for older CLI versions that emit JWT keys
          if [ -z "$SECRET_KEY" ]; then
            SECRET_KEY=$(grep -iE 'service.?role' /tmp/sb-status.txt \
              | grep -oE 'eyJ[A-Za-z0-9._-]+' | head -1)
          fi
          if [ -z "$ANON_KEY" ]; then
            ANON_KEY=$(grep -iE 'anon' /tmp/sb-status.txt \
              | grep -oE 'eyJ[A-Za-z0-9._-]+' | head -1)
          fi

          [ -n "$SECRET_KEY" ] && echo "SUPABASE_SECRET_KEY=${SECRET_KEY}" >> "$GITHUB_ENV"
          [ -n "$ANON_KEY"   ] && echo "PUBLIC_SUPABASE_PUBLISHABLE_KEY=${ANON_KEY}" >> "$GITHUB_ENV"

      - name: Apply Supabase migrations
        run: |
          set -euo pipefail

          supabase db reset --local --yes

      - name: Test — backend
        run: npm test
        working-directory: backend

      - name: Test — frontend
        run: npm test
        working-directory: frontend

      - name: Stop Supabase
        if: always()
        run: supabase stop

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Build — backend
        run: npm run build
        working-directory: backend

      - name: Build — frontend
        run: npm run build
        working-directory: frontend
