name: CI

on:
  push:
    branches: [main, developer]
  pull_request:
    branches: [main, developer]

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: ESLint — backend
        run: npm run lint
        working-directory: backend

      - name: SvelteKit sync
        run: npx svelte-kit sync
        working-directory: frontend

      - name: ESLint — frontend
        run: npm run lint
        working-directory: frontend

      - name: Prettier check
        run: npx prettier --check .

  # ── Typecheck ───────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — backend
        run: npm run typecheck
        working-directory: backend

      - name: SvelteKit sync
        run: npx svelte-kit sync
        working-directory: frontend

      - name: Paraglide compile
        run: npx paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide
        working-directory: frontend

      - name: TypeScript — frontend
        run: npm run typecheck
        working-directory: frontend

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: http://127.0.0.1:54321

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Start Supabase local
        run: |
          set -euo pipefail

          supabase telemetry disable

          # docker.io rate-limits anonymous pulls on shared GitHub-hosted runners;
          # `supabase start` pulls ~6 images, so transient 429s are common. Retry
          # with backoff instead of failing the whole job on a registry hiccup.
          for attempt in 1 2 3; do
            if supabase start; then
              break
            fi
            if [ "$attempt" = 3 ]; then
              echo "::error::supabase start failed after 3 attempts"
              exit 1
            fi
            echo "supabase start failed (attempt $attempt/3), retrying in $((attempt * 20))s..."
            supabase stop --no-backup || true
            sleep $((attempt * 20))
          done

          # Capture and parse supabase status to extract the actual API keys.
          # Strips ANSI escape codes before parsing.
          # Supports both the new sb_ key format and the legacy JWT format.
          supabase status 2>&1 \
            | sed $'s/\033\\[[0-9;]*[A-Za-z]//g' \
            > /tmp/sb-status.txt || true

          SECRET_KEY=$(grep -oE 'sb_secret_[A-Za-z0-9_-]+' /tmp/sb-status.txt | head -1)
          ANON_KEY=$(grep -oE 'sb_publishable_[A-Za-z0-9_-]+' /tmp/sb-status.txt | head -1)

          # Fallback for older CLI versions that emit JWT keys
          if [ -z "$SECRET_KEY" ]; then
            SECRET_KEY=$(grep -iE 'service.?role' /tmp/sb-status.txt \
              | grep -oE 'eyJ[A-Za-z0-9._-]+' | head -1)
          fi
          if [ -z "$ANON_KEY" ]; then
            ANON_KEY=$(grep -iE 'anon' /tmp/sb-status.txt \
              | grep -oE 'eyJ[A-Za-z0-9._-]+' | head -1)
          fi

          [ -n "$SECRET_KEY" ] && echo "SUPABASE_SECRET_KEY=${SECRET_KEY}" >> "$GITHUB_ENV"
          [ -n "$ANON_KEY"   ] && echo "PUBLIC_SUPABASE_PUBLISHABLE_KEY=${ANON_KEY}" >> "$GITHUB_ENV"

      - name: Apply Supabase migrations
        run: |
          set -euo pipefail

          supabase db reset --local --yes

      - name: Wait for PostgREST schema reload
        run: |
          set -euo pipefail

          # `db reset` restarts all containers including Kong (the Supabase API
          # gateway). Kong reloads its API-key config from Postgres after restart,
          # which takes longer than PostgREST itself — so an HTTP probe via Kong
          # returns 403 until Kong finishes, even when the DB is ready.
          #
          # Bypass Kong entirely: poll Postgres directly on port 54322 (the raw
          # DB port), then explicitly trigger a PostgREST schema-cache reload via
          # NOTIFY so fresh migrations are visible without any timing guesswork.
          DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"

          for attempt in $(seq 1 20); do
            if PGPASSWORD=postgres psql "$DB_URL" -c "SELECT 1" >/dev/null 2>&1; then
              echo "Postgres ready (attempt $attempt/20)"
              break
            fi
            if [ "$attempt" = 20 ]; then
              echo "::error::Postgres did not become ready in 40 s"
              exit 1
            fi
            echo "Waiting for Postgres... (attempt $attempt/20)"
            sleep 2
          done

          # Trigger PostgREST schema-cache reload so all migration changes
          # are immediately visible without a further timing window.
          PGPASSWORD=postgres psql "$DB_URL" \
            -c "NOTIFY pgrst, 'reload schema'"
          echo "PostgREST schema reload triggered — waiting 3 s"
          sleep 3

      - name: Test — backend
        run: npm test
        working-directory: backend

      - name: Test — frontend
        run: npm test
        working-directory: frontend

      - name: Stop Supabase
        if: always()
        run: supabase stop

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Build — backend
        run: npm run build
        working-directory: backend

      - name: Build — frontend
        run: npm run build
        working-directory: frontend
