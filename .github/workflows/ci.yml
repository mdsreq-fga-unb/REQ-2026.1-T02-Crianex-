name: CI

on:
  push:
    branches: [main, developer]
  pull_request:
    branches: [main, developer]

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: ESLint — backend
        run: npm run lint
        working-directory: backend

      - name: SvelteKit sync (gera .svelte-kit/tsconfig.json)
        run: npx svelte-kit sync
        working-directory: frontend

      - name: ESLint — frontend
        run: npm run lint
        working-directory: frontend

      - name: Prettier check
        run: npx prettier --check .

  # ── Typecheck ───────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — backend
        run: npm run typecheck
        working-directory: backend

      - name: SvelteKit sync (gera .svelte-kit/types)
        run: npx svelte-kit sync
        working-directory: frontend

      - name: Paraglide compile (gera src/lib/paraglide/)
        run: npx paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide
        working-directory: frontend

      - name: TypeScript — frontend
        run: npm run typecheck
        working-directory: frontend

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Start Supabase local and wait for keys
        run: |
          set -e
          # Start Supabase in background
          supabase start --no-telemetry &
          # Wait until supabase status exposes env variables with keys (timeout ~120s)
          for i in $(seq 1 120); do
            supabase status --output env > supabase.env 2>/dev/null || true
            if [ -s supabase.env ] && grep -q '^PUBLISHABLE_KEY=' supabase.env && grep -q '^SERVICE_ROLE_KEY=' supabase.env; then
              echo "Supabase started and keys are available"
              break
            fi
            sleep 1
          done
          if ! [ -s supabase.env ] || ! grep -q '^PUBLISHABLE_KEY=' supabase.env || ! grep -q '^SERVICE_ROLE_KEY=' supabase.env; then
            echo "Supabase did not start correctly or keys are missing. Dumping status for debug:" >&2
            supabase status --output pretty || true
            cat supabase.env || true
            exit 1
          fi

      - name: Export Supabase keys to Actions env
        run: |
          set -e
          # Read variable values from supabase.env and export to GitHub Actions env
          PUBLISHABLE=$(grep '^PUBLISHABLE_KEY=' supabase.env | cut -d'=' -f2-)
          SERVICE_ROLE=$(grep '^SERVICE_ROLE_KEY=' supabase.env | cut -d'=' -f2-)
          API_URL=$(grep '^API_URL=' supabase.env | cut -d'=' -f2- || echo 'http://127.0.0.1:54321')
          if [ -z "$PUBLISHABLE" ] || [ -z "$SERVICE_ROLE" ]; then
            echo "Required Supabase keys are empty; aborting" >&2
            exit 1
          fi
          echo "PUBLIC_SUPABASE_PUBLISHABLE_KEY=$PUBLISHABLE" >> $GITHUB_ENV
          echo "SUPABASE_SECRET_KEY=$SERVICE_ROLE" >> $GITHUB_ENV
          echo "SUPABASE_URL=$API_URL" >> $GITHUB_ENV

      - name: Apply Supabase migrations
        run: supabase db reset --local --yes

      - name: Test — backend
        run: npm test
        working-directory: backend

      - name: Test — frontend
        run: npm test
        working-directory: frontend

  # ── Build ───────────────────────────────────────────────────────────────────
  # Só roda se lint + typecheck + test passarem (gate de qualidade)
  build:
    name: Build
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Build — backend
        run: npm run build
        working-directory: backend

      - name: Build — frontend
        run: npm run build
        working-directory: frontend
