name: CI

on:
  push:
    branches: [main, developer]
  pull_request:
    branches: [main, developer]

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      - name: ESLint — backend
        run: npm run lint
        working-directory: backend

      - name: SvelteKit sync (gera .svelte-kit/tsconfig.json)
        run: npx svelte-kit sync
        working-directory: frontend

      - name: ESLint — frontend
        run: npm run lint
        working-directory: frontend

      - name: Prettier check
        run: npx prettier --check .

  # ── Typecheck ───────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      - name: TypeScript — backend
        run: npm run typecheck
        working-directory: backend

      - name: SvelteKit sync (gera .svelte-kit/types)
        run: npx svelte-kit sync
        working-directory: frontend

      - name: Paraglide compile (gera src/lib/paraglide/)
        run: npx paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide
        working-directory: frontend

      - name: TypeScript — frontend
        run: npm run typecheck
        working-directory: frontend

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Start Supabase local
        run: |
          supabase start --no-telemetry &
          # wait until Supabase reports healthy (timeout ~60s)
          for i in $(seq 1 60); do
            supabase status >/dev/null 2>&1 && break || sleep 1
          done

      - name: Extract Supabase keys and export env
        run: |
          # Export machine-parsable env file from supabase status
          supabase status --output env | tee supabase.env
          # Read exact variable names from env file and export to GitHub Actions env
          PUBLISHABLE=$(grep '^PUBLISHABLE_KEY=' supabase.env | cut -d'=' -f2-)
          SERVICE_ROLE=$(grep '^SERVICE_ROLE_KEY=' supabase.env | cut -d'=' -f2-)
          API_URL=$(grep '^API_URL=' supabase.env | cut -d'=' -f2- || echo 'http://127.0.0.1:54321')
          echo "PUBLIC_SUPABASE_PUBLISHABLE_KEY=$PUBLISHABLE" >> $GITHUB_ENV
          echo "SUPABASE_SECRET_KEY=$SERVICE_ROLE" >> $GITHUB_ENV
          echo "SUPABASE_URL=$API_URL" >> $GITHUB_ENV

      - name: Apply Supabase migrations
        run: supabase db reset --local --yes

      - name: Test — backend
        run: npm test
        working-directory: backend

      - name: Test — frontend
        run: npm test
        working-directory: frontend

  # ── Build ───────────────────────────────────────────────────────────────────
  # Só roda se lint + typecheck + test passarem (gate de qualidade)
  build:
    name: Build
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      - name: Build — backend
        run: npm run build
        working-directory: backend

      - name: Build — frontend
        run: npm run build
        working-directory: frontend
