<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Crianex CRM — Pipeline de leads</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="crm.css"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #root { position: fixed; inset: 0; }
    /* dark admin surface tokens applied to the whole page */
    .crm-shell {
      position: absolute; inset: 0;
      --bg: #0a0a0c; --bg-elev: #131316; --bg-soft: #18181d; --bg-tint: #1a1622;
      --line: #25252b; --line-strong: #34343c;
      --text: #f4f4f5; --text-muted: #a5a4ad; --text-faint: #6f6e78;
      --accent-soft: rgba(127, 63, 229, 0.18); --accent-line: rgba(127, 63, 229, 0.4);
      background: var(--bg); color: var(--text);
      font-family: var(--font-sans);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="20" fill="#7f3fe5"/>
      <rect x="24" y="30" width="16" height="42" rx="3" fill="#fff" opacity="0.9"/>
      <rect x="44" y="30" width="16" height="42" rx="3" fill="#fff" opacity="0.6"/>
      <rect x="64" y="30" width="12" height="42" rx="3" fill="#fff" opacity="0.4"/>
    </svg>
  </template>

  <script src="crm-data.js"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="crm-modals.jsx"></script>
  <script type="text/babel" src="crm.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(
      <div className="crm-shell">
        <window.CRMPage/>
      </div>
    );
  </script>
</body>
</html>
