<text x="585" y="125" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#5A4500">RF37 · Captura de lead -&gt; card no CRM (ACID)</text>
<text x="355" y="166" text-anchor="middle" font-size="11" fill="#333">preenche formulario + consentimento LGPD</text>
<line x1="125" y1="172" x2="585" y2="172" stroke="#37474F" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="700" y="210" text-anchor="middle" font-size="11" fill="#333">POST /api/public/contact</text>
