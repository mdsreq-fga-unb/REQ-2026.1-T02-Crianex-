<text x="930" y="293" text-anchor="middle" font-size="11" font-style="italic" fill="#5A4A00">transacao unica (ACID - RNF06)</text>
<text x="930" y="334" text-anchor="middle" font-size="11" fill="#333">INSERT client + client_card(coluna default) + notification</text>
<line x1="815" y1="340" x2="1045" y2="340" stroke="#37474F" stroke-width="1.5" marker-end="url(#ah)"/>
