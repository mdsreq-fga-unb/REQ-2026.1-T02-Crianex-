<path d="M815,1174 h30 v18 h-30" fill="none" stroke="#37474F" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="853" y="1180" font-size="11" fill="#333">validateJWT falha</text>
<text x="700" y="1210" text-anchor="middle" font-size="11" fill="#333">401 Unauthorized</text>
<line x1="815" y1="1216" x2="585" y2="1216" stroke="#78909C" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ahr)"/>
