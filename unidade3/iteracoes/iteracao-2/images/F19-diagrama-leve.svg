<text x="470" y="542" text-anchor="middle" font-size="11" fill="#333">editar dados / inativar cliente</text>
<line x1="355" y1="548" x2="585" y2="548" stroke="#37474F" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="700" y="586" text-anchor="middle" font-size="11" fill="#333">PATCH /api/crm/clients/:id  (Bearer)</text>
<line x1="585" y1="592" x2="815" y2="592" stroke="#37474F" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M815,628 h30 v18 h-30" fill="none" stroke="#37474F" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="853" y="634" font-size="11" fill="#333">validateJWT + requireRole</text>
<text x="930" y="664" text-anchor="middle" font-size="11" fill="#333">UPDATE clients SET ... | status=inativo</text>
<line x1="815" y1="670" x2="1045" y2="670" stroke="#37474F" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="700" y="708" text-anchor="middle" font-size="11" fill="#333">200 OK</text>
<line x1="815" y1="714" x2="585" y2="714" stroke="#78909C" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ahr)"/>
<text x="470" y="748" text-anchor="middle" font-size="11" fill="#333">lista atualizada sem reload</text>
<line x1="585" y1="754" x2="355" y2="754" stroke="#78909C" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ahr)"/>
<rect x="20" y="774" width="1130" height="26" rx="5" fill="#FCE7A2" stroke="#E0B33A" stroke-width="1"/>
<text x="585" y="791" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#5A4500">RF41 · Atualizar informacoes do card</text>
<text x="470" y="832" text-anchor="middle" font-size="11" fill="#333">atualizar / mover card (drag-and-drop)</text>
<line x1="355" y1="838" x2="585" y2="838" stroke="#37474F" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="700" y="876" text-anchor="middle" font-size="11" fill="#333">PATCH /api/crm/cards/:id  (Bearer)</text>
