<text x="930" y="920" text-anchor="middle" font-size="11" fill="#333">UPDATE client_card</text>
<line x1="815" y1="926" x2="1045" y2="926" stroke="#37474F" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="700" y="964" text-anchor="middle" font-size="11" fill="#333">200 OK</text>
<line x1="815" y1="970" x2="585" y2="970" stroke="#78909C" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ahr)"/>
<text x="470" y="1004" text-anchor="middle" font-size="11" fill="#333">card atualizado de forma intuitiva (RNF24/RNF25)</text>
<line x1="585" y1="1010" x2="355" y2="1010" stroke="#78909C" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ahr)"/>
<rect x="20" y="1030" width="1130" height="26" rx="5" fill="#FCE7A2" stroke="#E0B33A" stroke-width="1"/>
<text x="585" y="1047" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#5A4500">Tentativa sem autorizacao</text>
<text x="470" y="1088" text-anchor="middle" font-size="11" fill="#333">PATCH com token invalido</text>
<line x1="355" y1="1094" x2="585" y2="1094" stroke="#37474F" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="700" y="1132" text-anchor="middle" font-size="11" fill="#333">Authorization: Bearer &lt;invalido&gt;</text>
