name: crianex

# ─────────────────────────────────────────────────────────────────────────────
# Serviços de desenvolvimento — frontend e backend
#
# Supabase NÃO está aqui: use `supabase start` (Supabase CLI)
# que sobe Postgres, Studio, Auth, Storage e API na porta 54321.
# Após subir, copie os valores de `supabase status` para o .env
# ─────────────────────────────────────────────────────────────────────────────

services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  backend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    command: sh -c "npm install && npm run dev"

volumes:
  frontend_node_modules:
  backend_node_modules:
